<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trying to Draw - Perspective Tool</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; touch-action: none; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(240, 240, 240, 0.95); padding: 10px; 
            border: 2px solid #000; border-radius: 5px; 
        }
        select { font-size: 16px; padding: 5px; cursor: pointer; border: 1px solid #000; border-radius: 4px; background: #fff; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui">
        <select id="s">
            <option value="cube">Cube</option>
            <option value="beam">Beam (Wide)</option>
            <option value="column">Column (Tall)</option>
        </select>
    </div>
    <canvas id="c"></canvas>

<script>
window.onload = function() {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const sel = document.getElementById('s');

    let w, h, zoom = 200, ax = 0.5, ay = 0.5, drag = false, lx, ly;
    let initialPinchDist = null;
    let initialZoom = 200;

    const sizes = { cube: [1,1,1], beam: [2.5,0.8,1], column: [0.7,3.0,0.7] };
    let cur = sizes.cube;

    function res() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = res; res();

    function proj(vx, vy, vz, m = 1) {
        let x = vx * m, y = vy * m, z = vz * m;
        let cY = Math.cos(ay), sY = Math.sin(ay), cX = Math.cos(ax), sX = Math.sin(ax);
        let tx = x * cY - z * sY, tz = x * sY + z * cY;
        let ty = y * cX - tz * sX; tz = y * sX + tz * cX;
        let sc = zoom / (5 + tz);
        return { x: w/2 + tx * sc, y: h/2 + ty * sc };
    }

    const edges = [[0,1,'#d32f2f'],[3,2,'#d32f2f'],[4,5,'#d32f2f'],[6,7,'#d32f2f'],[0,3,'#388e3c'],[1,2,'#388e3c'],[4,7,'#388e3c'],[5,6,'#388e3c'],[0,4,'#1976d2'],[1,5,'#1976d2'],[2,6,'#1976d2'],[3,7,'#1976d2']];

    function getDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        const v = [{x:-cur[0],y:-cur[1],z:-cur[2]},{x:cur[0],y:-cur[1],z:-cur[2]},{x:cur[0],y:cur[1],z:-cur[2]},{x:-cur[0],y:cur[1],z:-cur[2]},{x:-cur[0],y:-cur[1],z:cur[2]},{x:cur[0],y:-cur[1],z:cur[2]},{x:cur[0],y:cur[1],z:cur[2]},{x:-cur[0],y:cur[1],z:cur[2]}];
        const vps = [proj(1,0,0,1000), proj(0,1,0,1000), proj(0,0,1,1000)];
        
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5; ctx.setLineDash([8,8]);
        ctx.beginPath(); ctx.moveTo(vps[1].x, 0); ctx.lineTo(vps[1].x, h); ctx.stroke();
        let dx = vps[2].x - vps[0].x, dy = vps[2].y - vps[0].y;
        ctx.beginPath(); ctx.moveTo(vps[0].x - dx*20, vps[0].y - dy*20); ctx.lineTo(vps[2].x + dx*20, vps[2].y + dy*20); ctx.stroke();
        ctx.setLineDash([]);

        vps.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fillStyle = '#000'; ctx.fill(); });
        
        edges.forEach(e => {
            let p1 = proj(v[e[0]].x, v[e[0]].y, v[e[0]].z);
            let p2 = proj(v[e[1]].x, v[e[1]].y, v[e[1]].z);
            let vp = proj(v[e[1]].x-v[e[0]].x, v[e[1]].y-v[e[0]].y, v[e[1]].z-v[e[0]].z, 1000);
            
            let x1 = Math.round(p1.x), y1 = Math.round(p1.y), x2 = Math.round(p2.x), y2 = Math.round(p2.y), vpx = Math.round(vp.x), vpy = Math.round(vp.y);

            ctx.beginPath(); ctx.strokeStyle = e[2]; ctx.globalAlpha = 0.5; ctx.lineWidth = 2.0; ctx.lineCap = 'round';
            ctx.moveTo(x1, y1); ctx.lineTo(vpx, vpy); ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = '#000'; ctx.globalAlpha = 1; ctx.lineWidth = 4.0; ctx.lineCap = 'round';
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        });
        requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousedown', e => { drag = true; lx = e.clientX; ly = e.clientY; });
    window.addEventListener('mousemove', e => { if(drag) { ay += (e.clientX - lx) * 0.01; ax += (e.clientY - ly) * 0.01; lx = e.clientX; ly = e.clientY; }});
    window.addEventListener('mouseup', () => drag = false);

    canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            initialPinchDist = getDist(e.touches);
            initialZoom = zoom;
        } else {
            drag = true;
            lx = e.touches[0].clientX; ly = e.touches[0].clientY;
        }
    }, {passive: true});

    window.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && initialPinchDist !== null) {
            const currentDist = getDist(e.touches);
            const scale = currentDist / initialPinchDist;
            zoom = Math.max(50, Math.min(1000, initialZoom * scale));
        } else if (drag) {
            ay += (e.touches[0].clientX - lx) * 0.01;
            ax += (e.touches[0].clientY - ly) * 0.01;
            lx = e.touches[0].clientX; ly = e.touches[0].clientY;
        }
        e.preventDefault();
    }, {passive: false});

    window.addEventListener('touchend', () => { drag = false; initialPinchDist = null; });
    window.addEventListener('wheel', e => { zoom = Math.max(50, zoom - e.deltaY * 0.5); e.preventDefault(); }, {passive: false});
    
    // CORREÇÃO AQUI: de 'acur' para 'cur'
    sel.onchange = e => cur = sizes[e.target.value];

    draw();
};
</script>
</body>
</html>
